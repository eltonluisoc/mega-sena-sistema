<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Meus Bolões - Bolões Aleatórios</title>
    <meta name="theme-color" content="#3b82f6">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #3b82f6 0%, #10b981 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            margin-bottom: 16px;
        }

        .card-header {
            padding: 20px 24px;
            font-weight: bold;
            font-size: 18px;
            color: white;
            background: #3b82f6;
            text-align: center;
        }

        .card-header .subtitle {
            font-size: 13px;
            font-weight: normal;
            opacity: 0.85;
            margin-top: 4px;
        }

        .card-body {
            padding: 20px 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: #1e293b;
            margin-bottom: 6px;
        }

        .input-telefone {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 18px;
            font-family: monospace;
            background: #f8fafc;
            transition: all 0.2s;
            text-align: center;
            letter-spacing: 2px;
        }

        .input-telefone:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .input-telefone::placeholder {
            font-size: 14px;
            letter-spacing: 0;
            color: #94a3b8;
        }

        .btn-consultar {
            width: 100%;
            padding: 16px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-consultar:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .btn-consultar:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-voltar {
            display: block;
            width: 100%;
            padding: 12px;
            background: #64748b;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            margin-top: 12px;
        }

        .btn-voltar:hover {
            background: #475569;
        }

        .dica {
            background: #f1f5f9;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            color: #475569;
            margin-bottom: 16px;
        }

        .dica strong {
            color: #1e293b;
        }

        .dica .exemplo {
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: #94a3b8;
        }

        .loading .spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
            font-size: 32px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .resultado-titulo {
            font-size: 16px;
            font-weight: bold;
            color: #1e293b;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e2e8f0;
        }

        .resultado-titulo .badge {
            font-size: 12px;
            font-weight: normal;
            color: #64748b;
        }

        .bolao-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
            transition: all 0.2s;
        }

        .bolao-card:hover {
            border-color: #3b82f6;
        }

        .bolao-nome {
            font-weight: bold;
            font-size: 15px;
            color: #1e293b;
        }

        .bolao-info {
            font-size: 13px;
            color: #475569;
            margin-top: 4px;
        }

        .bolao-info span {
            margin-right: 12px;
        }

        .bolao-status {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 6px;
        }

        .status-aberto {
            background: #d1fae5;
            color: #065f46;
        }

        .status-andamento {
            background: #fef3c7;
            color: #92400e;
        }

        .status-encerrado {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-pago {
            background: #d1fae5;
            color: #065f46;
        }

        .status-pendente {
            background: #fef3c7;
            color: #92400e;
        }

        .secao-boloes {
            margin-top: 20px;
        }

        .secao-boloes .secao-titulo {
            font-weight: bold;
            font-size: 14px;
            color: #1e293b;
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .secao-boloes .secao-titulo.aberto {
            background: #d1fae5;
            color: #065f46;
        }

        .secao-boloes .secao-titulo.andamento {
            background: #fef3c7;
            color: #92400e;
        }

        .secao-boloes .secao-titulo.encerrado {
            background: #fee2e2;
            color: #991b1b;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 11px;
            color: rgba(255,255,255,0.7);
        }

        @media (max-width: 480px) {
            body { padding: 12px; }
            .card-body { padding: 16px; }
            .input-telefone { font-size: 16px; padding: 12px; }
            .btn-consultar { font-size: 15px; padding: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                🔍 MEUS BOLÕES
                <div class="subtitle">Consulte os bolões que você participa</div>
            </div>
            <div class="card-body" id="conteudo">
                <!-- FORMULÁRIO DE CONSULTA -->
                <div id="formConsulta">
                    <div class="dica">
                        📌 Digite apenas os números do seu telefone com DDD.<br>
                        <strong>Exemplos:</strong>
                        <span class="exemplo">61999999999</span> (celular)
                        <span class="exemplo">2133333333</span> (fixo)
                    </div>
                    
                    <div class="form-group">
                        <label>📞 Seu telefone:</label>
                        <input type="tel" id="telefoneInput" class="input-telefone" 
                               placeholder="Ex: 61999999999" 
                               maxlength="11" 
                               inputmode="numeric">
                    </div>
                    
                    <button id="btnConsultar" class="btn-consultar">🔍 CONSULTAR MEUS BOLÕES</button>
                    
                    <a href="index.html" class="btn-voltar">⬅️ VOLTAR PARA O SITE</a>
                </div>

                <!-- RESULTADOS (oculto inicialmente) -->
                <div id="resultados" style="display: none;">
                    <div id="resultadoConteudo"></div>
                    <button id="btnNovaConsulta" class="btn-voltar" style="margin-top: 12px;">🔄 NOVA CONSULTA</button>
                    <a href="index.html" class="btn-voltar">⬅️ VOLTAR PARA O SITE</a>
                </div>
            </div>
        </div>

        <div class="footer">
            © 2026 Bolões Aleatórios - Consulta de Participação
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="consulta.js"></script>
</body>
</html>
